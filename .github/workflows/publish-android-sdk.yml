name: Publish Android SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish, for example 1.0.1
        required: true
        type: string
      dry_run:
        description: Build and publish to Maven Local only
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      ORG_GRADLE_PROJECT_gprUser: ${{ github.actor }}
      ORG_GRADLE_PROJECT_gprToken: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            DRY_RUN="false"
          else
            VERSION="${{ github.event.inputs.version }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

      - name: Validate release build
        run: >-
          ./gradlew
          :showtrak-sdk:assembleRelease
          :showtrak-sdk:publishToMavenLocal
          -PVERSION_NAME=${{ steps.version.outputs.version }}
          --stacktrace

      - name: Publish to Maven Central
        if: steps.version.outputs.dry_run != 'true'
        run: >-
          ./gradlew
          publishAndReleaseToMavenCentral
          -PVERSION_NAME=${{ steps.version.outputs.version }}
          --stacktrace

      - name: Publish to GitHub Packages
        if: steps.version.outputs.dry_run != 'true'
        run: >-
          ./gradlew
          :showtrak-sdk:publishMavenPublicationToGitHubPackagesRepository
          -PVERSION_NAME=${{ steps.version.outputs.version }}
          --stacktrace